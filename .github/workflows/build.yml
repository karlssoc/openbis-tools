name: build-standalone

# Builds single-file `obtools` executables. PyInstaller cannot cross-compile,
# so each target OS is built on its own runner. On a vX.Y.Z tag the binaries are
# published as downloadable GitHub Release assets; manual runs just leave them
# as Actions artifacts.
on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: windows-x64
            binary: dist/obtools.exe
          - os: macos-latest
            target: macos-arm64
            binary: dist/obtools
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[secure]" pyinstaller

      - name: Build
        run: python -m PyInstaller --clean --noconfirm packaging/obtools.spec

      - name: Smoke test
        run: ${{ matrix.binary }} cred show

      - name: Stage portable package
        shell: bash
        run: |
          # Binary + a .obtools/ folder so the package is portable-by-default:
          # unzip both into one folder on the stick and obtools runs portably.
          mkdir -p pkg/.obtools
          cp "${{ matrix.binary }}" pkg/
          cp packaging/portable-readme.txt pkg/.obtools/README.txt

      - name: Zip (Windows)
        if: runner.os == 'Windows'
        run: Compress-Archive -Path pkg\obtools.exe, pkg\.obtools -DestinationPath obtools-${{ matrix.target }}.zip

      - name: Zip (Unix)
        if: runner.os != 'Windows'
        run: cd pkg && zip -r ../obtools-${{ matrix.target }}.zip obtools .obtools

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: obtools-${{ matrix.target }}
          path: obtools-${{ matrix.target }}.zip

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: obtools-*
          merge-multiple: true

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          gh release create "${GITHUB_REF_NAME}" artifacts/*.zip \
            --title "obtools ${GITHUB_REF_NAME}" \
            --generate-notes
